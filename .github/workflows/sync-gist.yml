name: Đồng bộ Gist -> file JSON tĩnh

# Chạy định kỳ (mỗi 5 phút) + cho phép bấm chạy tay từ tab Actions trên GitHub.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Thêm dòng này để lấy đủ lịch sử commit, tránh lỗi khi chạy 'git pull --rebase'
          fetch-depth: 0

      - name: Tải dữ liệu mới nhất từ Gist
        env:
          GIST_ID: bb8129ecb8bcc5efbde0f9a15fda315f
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GIST_TOKEN}" \
            "https://api.github.com/gists/${GIST_ID}" \
            -o gist_response.json

          # Lấy đúng nội dung file "fsel_answers.json" bên trong Gist
          node -e "
            const fs = require('fs');
            const gist = JSON.parse(fs.readFileSync('gist_response.json', 'utf8'));
            const file = gist.files && gist.files['fsel_answers.json'];
            if(!file){ console.error('Không tìm thấy file fsel_answers.json trong Gist'); process.exit(1); }
            fs.writeFileSync('fsel_answers.json', file.content);
          "
          rm -f gist_response.json

      - name: Commit + push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add fsel_answers.json
          if ! git diff --staged --quiet; then
            git commit -m "Tự động đồng bộ đáp án từ Gist"
            # Kéo code mới về, nếu trùng file fsel_answers.json thì ưu tiên lấy file vừa tải từ Gist xuống (-X theirs)
            git pull origin main --rebase -X theirs
            git push origin main
          else
            echo "Không có gì thay đổi, bỏ qua push."
          fi
