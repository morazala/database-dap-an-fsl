name: Rollback GitHub Gist

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'Nhập số Run của workflow đồng bộ muốn quay về (VD: 30)'
        required: true

jobs:
  rollback-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Gist Commit SHA from Workflow Run
        id: get_gist_data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # SỬA TẠI ĐÂY: Dùng gh run list để tìm đúng số hiển thị (number) và bốc ra thời gian tạo (createdAt)
          COMMIT_DATE=$(gh run list --workflow="Đồng bộ Gist -> file JSON tĩnh" --repo ${{ github.repository }} --json number,createdAt --jq ".[] | select(.number == ${{ github.event.inputs.run_number }}).createdAt")
          
          if [ -z "$COMMIT_DATE" ]; then
            echo "❌ Không tìm thấy thông tin thời gian cho Run #${{ github.event.inputs.run_number }}"
            exit 1
          fi
          echo "Thời điểm chạy Run #${{ github.event.inputs.run_number }} là: $COMMIT_DATE"
          
          # 2. Bây giờ mới Clone Gist về thư mục tạm
          git clone https://gist.github.com/bb8129ecb8bcc5efbde0f9a15fda315f.git gist_repo
          
          # 3. Vào thư mục Gist và tìm commit cũ dựa trên thời gian đã lấy ở bước 1
          cd gist_repo
          GIST_SHA=$(git log --before="$COMMIT_DATE" -1 --format=%H)
          
          if [ -z "$GIST_SHA" ]; then
             echo "❌ Không xác định được commit cũ của Gist trước thời điểm $COMMIT_DATE"
             exit 1
          fi
          echo "Tìm thấy Gist Commit SHA tương ứng: $GIST_SHA"
          
          # Checkout file JSON tại thời điểm đó
          git checkout $GIST_SHA -- fsel_answers.json
          
          # Đọc nội dung file JSON đẩy vào biến môi trường
          echo "GIST_CONTENT<<EOF" >> $GITHUB_ENV
          cat fsel_answers.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update Gist via API
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN || github.token }}
        run: |
          cat << 'EOF' > payload.json
          {
            "description": "Rollback dữ liệu về phiên bản cũ",
            "files": {
              "fsel_answers.json": {
                "content": ""
              }
            }
          }
          EOF
          
          # Nhúng nội dung JSON cũ vào payload bằng jq
          jq --arg content "$GIST_CONTENT" '.files["fsel_answers.json"].content = $content' payload.json > final_payload.json
          
          # Gửi request cập nhật Gist
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/bb8129ecb8bcc5efbde0f9a15fda315f \
            -d @final_payload.json
            
          echo "🎉 Đã rollback Gist thành công về trạng thái của Run #${{ github.event.inputs.run_number }}!"