name: Rollback GitHub Gist

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'Nhập số Run của workflow đồng bộ muốn quay về (VD: 30)'
        required: true

jobs:
  rollback-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Gist Commit SHA from Workflow Run
        id: get_gist_data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Tìm Commit SHA của repo tại Run đó
          REPO_SHA=$(gh run list --workflow="Đồng bộ Gist -> file JSON tĩnh" --json number,headSha --jq ".[] | select(.number == ${{ github.event.inputs.run_number }}).headSha")
          
          if [ -z "$REPO_SHA" ]; then
            echo "❌ Không tìm thấy Run #${{ github.event.inputs.run_number }}"
            exit 1
          fi
          
          echo "Tìm thấy Repo SHA tại thời điểm đó: $REPO_SHA"
          
          # 2. Clone Gist về thư mục tạm
          git clone https://gist.github.com/bb8129ecb8bcc5efbde0f9a15fda315f.git gist_repo
          
          cd gist_repo
          # Lấy thời gian tạo của repo commit
          COMMIT_DATE=$(git log -1 --format=%ai $REPO_SHA 2>/dev/null || echo "")
          
          if [ -z "$COMMIT_DATE" ]; then
            # ĐÃ SỬA TẠI ĐÂY: Loại bỏ ký tự lạ, dùng chuẩn --json createdAt
            COMMIT_DATE=$(gh run view ${{ github.event.inputs.run_number }} --json createdAt --jq ".createdAt")
          fi
          
          echo "Thời điểm chạy Run: $COMMIT_DATE"
          
          # Tìm Gist Commit SHA gần nhất trước thời điểm Run đó kết thúc
          GIST_SHA=$(git log --before="$COMMIT_DATE" -1 --format=%H)
          
          if [ -z "$GIST_SHA" ]; then
             echo "❌ Không xác định được commit cũ của Gist."
             exit 1
          fi
          
          echo "Tìm thấy Gist Commit SHA tương ứng: $GIST_SHA"
          
          # Checkout file JSON tại thời điểm đó
          git checkout $GIST_SHA -- fsel_answers.json
          
          # Đọc nội dung file JSON và xử lý xuống dòng để đẩy vào biến môi trường
          echo "GIST_CONTENT<<EOF" >> $GITHUB_ENV
          cat fsel_answers.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update Gist via API
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN || github.token }}
        run: |
          cat << 'EOF' > payload.json
          {
            "description": "Rollback dữ liệu về phiên bản cũ",
            "files": {
              "fsel_answers.json": {
                "content": ""
              }
            }
          }
          EOF
          
          # Nhúng nội dung JSON cũ vào payload bằng jq
          jq --arg content "$GIST_CONTENT" '.files["fsel_answers.json"].content = $content' payload.json > final_payload.json
          
          # Gửi request cập nhật Gist
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/bb8129ecb8bcc5efbde0f9a15fda315f \
            -d @final_payload.json
            
          echo "🎉 Đã rollback Gist thành công về trạng thái của Run #${{ github.event.inputs.run_number }}!"